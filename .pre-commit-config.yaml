---
# ─────────────────────────────────────────────────────────────────
# Pre-commit hooks — Cloud Shield
# Exécution : pre-commit run --all-files
# Installation : pre-commit install
# ─────────────────────────────────────────────────────────────────

repos:
  # ── Terraform ──────────────────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        name: "Terraform fmt"
        args: [--args=-recursive]

      - id: terraform_validate
        name: "Terraform validate"

      - id: terraform_tflint
        name: "TFLint"
        args:
          - --args=--chdir=terraform

      - id: terraform_tfsec
        name: "TFSec"
        args:
          - --args=--minimum-severity=HIGH

      - id: terraform_checkov
        name: "Checkov"
        args:
          - --args=--framework terraform
          - --args=--skip-check CKV_AZURE_131,CKV_AZURE_190,CKV_AZURE_213
          - --args=--skip-check CKV2_AZURE_1,CKV2_AZURE_18,CKV_AZURE_59

  # ── Secrets — Gitleaks ─────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: "Gitleaks — détection de secrets"

  # ── Qualité générale ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: "Trailing whitespace"
      - id: end-of-file-fixer
        name: "End of file fixer"
      - id: check-yaml
        name: "YAML syntax check"
      - id: check-json
        name: "JSON syntax check"
      - id: detect-private-key
        name: "Detect private keys"
